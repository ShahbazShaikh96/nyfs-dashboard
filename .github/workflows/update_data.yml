name: Update NYFS Data

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh processed NYFS data
        env:
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
        run: |
          # Auto mode tries v3 query pagination first, then falls back to legacy $limit/$offset if needed.
          python update_data.py --api-mode auto

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_restaurants.csv data/restaurant_inspections.csv data/refresh_metadata.json
          if git diff --cached --quiet; then
            echo "No refreshed data changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh NYFS data"
          git push
